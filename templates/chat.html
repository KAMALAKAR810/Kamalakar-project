{% extends "base.html" %}
{% block content %}
<style>
    .chat-container {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 120px);
        max-width: 600px;
        margin: 0 auto;
        background: #f0f2f5;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .chat-header {
        background: #075e54;
        color: white;
        padding: 15px;
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 600;
    }
    .chat-header img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
    
    .messages-area {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
    }
    .message-bubble {
        max-width: 75%;
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 14px;
        position: relative;
        box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        word-wrap: break-word;
    }
    .sent {
        align-self: flex-end;
        background: #dcf8c6;
        color: #000;
    }
    .received {
        align-self: flex-start;
        background: #fff;
        color: #000;
    }
    .message-time {
        font-size: 10px;
        color: #666;
        text-align: right;
        margin-top: 4px;
    }

    .chat-footer {
        padding: 10px;
        background: #f0f2f5;
        display: flex;
        gap: 10px;
        align-items: center;
    }
    .chat-input {
        flex: 1;
        padding: 12px;
        border-radius: 24px;
        border: none;
        outline: none;
        font-size: 14px;
    }
    .send-btn {
        background: #075e54;
        color: white;
        border: none;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
    }
</style>

<div class="chat-container">
    <div class="chat-header">
        <img src="{{ other_user.profile.profile_pic.url }}" alt="P">
        <div>
            <span>{{ other_user.first_name }}</span><br>
            <small style="font-weight: 400; font-size: 11px;">@{{ other_user.username }}</small>
        </div>
    </div>
    
    <div class="messages-area" id="messages-area">
        {% for msg in chat_messages %}
            <div class="message-bubble {% if msg.sender == user %}sent{% else %}received{% endif %}">
                {{ msg.content }}
                <div class="message-time">{{ msg.created_at|date:"H:i" }}</div>
            </div>
        {% endfor %}
    </div>

    <form id="chat-form" method="POST" class="chat-footer">
        {% csrf_token %}
        <input type="text" name="content" id="chat-content" class="chat-input" placeholder="Type a message..." required>
        <button type="submit" class="send-btn"><i class="fa fa-paper-plane"></i></button>
    </form>
</div>

<script>
    const msgArea = document.getElementById('messages-area');
    msgArea.scrollTop = msgArea.scrollHeight;

    const chatForm = document.getElementById('chat-form');
    chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const input = document.getElementById('chat-content');
        const content = input.value;
        if (!content) return;

        const formData = new FormData(chatForm);
        input.value = '';

        try {
            await fetch(window.location.href, {
                method: 'POST',
                headers: { 'X-Requested-With': 'XMLHttpRequest' },
                body: formData
            });
            // Simplified: reload to show new message or append dynamically
            location.reload();
        } catch (err) {
            console.error('Chat error:', err);
        }
    });
</script>
{% endblock %}
