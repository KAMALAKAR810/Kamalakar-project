{% extends "base.html" %}

{% block content %}
<div class="game-container" style="padding: 15px; max-width: 600px; margin: auto;">
    <div class="game-header" style="background: #01439A; color: white; padding: 10px; text-align: center; font-weight: bold;">
        JODI (10 KA 950)
    </div>

    <div class="input-row" style="display: flex; gap: 10px; margin: 15px 0;">
        <select id="market-select" style="flex: 1; padding: 10px; border-radius: 5px;">
            <option value="">---- Select Market ----</option>
            {% for market in markets %}
                <option value="{{ market.m_name }}">{{ market.m_name }}</option>
            {% endfor %}
        </select>
        <input type="text" value="19 Mar 2026" readonly style="width: 120px; text-align: center; border: 1px solid #ccc;">
    </div>

    <div class="grid-layout" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; max-height: 400px; overflow-y: auto; padding: 5px; border: 1px solid #eee;">
        {% for i in "0123456789" %}
            {% for j in "0123456789" %}
            <div class="cell" style="display: flex; align-items: center; background: #f9f9f9; padding: 5px; border-radius: 4px; border: 1px solid #ddd;">
                <label style="width: 30px; font-weight: bold;">{{ i }}{{ j }}</label>
                <input type="number" placeholder="Pts" style="width: 100%; border: 1px solid #ccc; padding: 4px;">
            </div>
            {% endfor %}
        {% endfor %}
    </div>

    <div class="total-points" style="margin-top: 15px; font-size: 18px; font-weight: bold; text-align: center; color: #01439A;">
        Total Points: <span id="total">0</span>
    </div>

    <button class="submit-btn" onclick="submitGame()" style="width: 100%; background: #28a745; color: white; border: none; padding: 15px; font-size: 16px; font-weight: bold; margin-top: 10px; border-radius: 5px; cursor: pointer;">
        SUBMIT JODI GAME
    </button>
</div>
{% endblock %}
