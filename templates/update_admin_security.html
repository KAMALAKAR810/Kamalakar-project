{% extends "base.html" %}
{% block content %}
<div class="main-content">
    <div class="page-shell">
        <h1 class="page-title">Admin Security Settings</h1>
        
        <div class="data-panel" style="max-width: 600px; margin: 0 auto; padding: 30px;">
            <p style="margin-bottom: 30px; color: var(--gray);">Configure your second factor authentication settings here. These settings apply to your admin account.</p>
            
            <form method="POST">
                {% csrf_token %}
                
                <div class="form-group" style="margin-bottom: 25px;">
                    <label style="display: block; font-weight: 700; margin-bottom: 10px;">Admin PIN (6 Digits)</label>
                    <input type="text" name="admin_pin" maxlength="6" pattern="\d{6}" value="{{ profile.admin_pin }}" required class="bet-input" placeholder="Enter 6-digit PIN">
                    <small style="color: #666;">This PIN will be required for admin area access.</small>
                </div>

                <div class="form-group" style="margin-bottom: 25px;">
                    <label style="display: block; font-weight: 700; margin-bottom: 10px;">Security Question</label>
                    <input type="text" name="admin_security_question" value="{{ profile.admin_security_question }}" required class="bet-input" placeholder="e.g. My favourite name">
                </div>

                <div class="form-group" style="margin-bottom: 30px;">
                    <label style="display: block; font-weight: 700; margin-bottom: 10px;">Security Answer</label>
                    <input type="text" name="admin_security_answer" value="{{ profile.admin_security_answer }}" required class="bet-input" placeholder="Enter answer">
                    <small style="color: #666;">Answers are case-insensitive.</small>
                </div>

                <div style="display: flex; gap: 15px;">
                    <button type="submit" class="btn-gold" style="flex: 1; padding: 15px; font-weight: 800;">SAVE SECURITY SETTINGS</button>
                    <a href="{% url 'admin_summary' %}" class="btn-tab" style="padding: 15px 30px; border: 1px solid var(--border); border-radius: 8px; text-decoration: none; color: var(--gray); font-weight: 700; display: flex; align-items: center; justify-content: center;">CANCEL</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
