{% extends "base.html" %}
{% block content %}
<section class="auth-shell">
    <div class="auth-card">
        <div class="auth-card-inner">
            <div class="auth-eyebrow"><i class="fas fa-key"></i> Reset Password</div>
            <div class="auth-header">
                <h2>Forgot your password?</h2>
                <p class="auth-subtitle">Enter your email and we will send a reset link.</p>
            </div>

            <form method="post" class="auth-form">
                {% csrf_token %}
                <div class="field">
                    <label for="id_email">Email</label>
                    <input class="control" type="email" name="email" id="id_email" placeholder="Enter your email" required autocomplete="email">
                </div>
                <button type="submit" class="auth-btn">Send Reset Link</button>
            </form>
        </div>

        <div class="auth-footer">
            <a href="{% url 'login' %}">Back to Sign In</a>
        </div>
    </div>
</section>
{% endblock %}
