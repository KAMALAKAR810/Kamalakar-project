{% extends "base.html" %}
{% block content %}
<section class="auth-shell">
    <div class="auth-card">
        <div class="auth-card-inner">
            <div class="auth-eyebrow"><i class="fas fa-envelope"></i> Email Sent</div>
            <div class="auth-header">
                <h2>Check your email</h2>
                <p class="auth-subtitle">If an account exists for that email, a password reset link has been sent.</p>
            </div>
        </div>
        <div class="auth-footer">
            <a href="{% url 'login' %}">Back to Sign In</a>
        </div>
    </div>
</section>
{% endblock %}
