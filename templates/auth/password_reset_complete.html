{% extends "base.html" %}
{% block content %}
<section class="auth-shell">
    <div class="auth-card">
        <div class="auth-card-inner">
            <div class="auth-eyebrow"><i class="fas fa-circle-check"></i> Password Updated</div>
            <div class="auth-header">
                <h2>Password reset successful</h2>
                <p class="auth-subtitle">You can now sign in with your new password.</p>
            </div>
            <a href="{% url 'login' %}" class="auth-btn" style="text-align:center;">Sign In</a>
        </div>
    </div>
</section>
<script>
    setTimeout(function () {
        window.location.href = "{% url 'login' %}";
    }, 1200);
</script>
{% endblock %}
