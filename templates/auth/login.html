{% extends "base.html" %}
{% load static %}

{% block content %}
<section class="auth-shell">
    <div class="auth-card">
        <div class="auth-card-inner">
            <div class="auth-eyebrow"><i class="fas fa-lock"></i> Sign In</div>
            <div class="auth-header">
                <h2>Access your account</h2>
                <p class="auth-subtitle">Enter your credentials to continue.</p>
            </div>

            <form method="post" class="auth-form" id="login-form">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ request.GET.next|default:'' }}">
                <input type="hidden" name="device_id" value="">

                <div class="field">
                    <label for="login-username">Username or email</label>
                    <input class="control" type="text" name="username" id="login-username" placeholder="Enter username or email" required autofocus autocomplete="username">
                </div>

                <div class="field">
                    <label for="login-password">Password</label>
                    <div class="password-wrapper">
                        <input class="control" type="password" name="password" id="login-password" placeholder="Enter password" required autocomplete="current-password">
                        <i class="fas fa-eye toggle-password" id="togglePassword" role="button" tabindex="0" aria-label="Show password"></i>
                    </div>
                </div>

                <button type="submit" class="auth-btn">Sign In</button>
            </form>
        </div>

        <div class="auth-footer">
            New here? <a href="{% url 'register' %}">Create your account</a>
            <span>&middot;</span>
            <a href="{% url 'landing' %}">Home</a>
        </div>
    </div>
</section>

<script>
    const loginPasswordToggle = document.getElementById('togglePassword');
    const loginPasswordInput = document.getElementById('login-password');
    if (loginPasswordToggle && loginPasswordInput) {
        const toggleLoginPassword = function () {
            const nextType = loginPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            loginPasswordInput.setAttribute('type', nextType);
            this.classList.toggle('fa-eye-slash');
        };
        loginPasswordToggle.addEventListener('click', toggleLoginPassword);
        loginPasswordToggle.addEventListener('keydown', function (event) {
            if (event.key === 'Enter' || event.key === ' ') { event.preventDefault(); toggleLoginPassword.call(this); }
        });
    }
</script>
{% endblock %}
