{% extends "base.html" %}
{% load static %}

{% block content %}
<style>
  .auth-container { display:flex; justify-content:center; align-items:center; min-height: calc(100vh - 250px); padding: 20px; }
  .auth-card { background: var(--white); padding: 40px; border-radius: 20px; width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid var(--border); }
  .auth-card h2 { font-size: 28px; font-weight: 800; text-align: center; margin-bottom: 12px; color: var(--dark); letter-spacing: -0.5px; }
  .auth-subtitle { text-align:center; font-size: 15px; color: var(--gray); margin-bottom: 30px; line-height: 1.6; }
  .otp-input-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 24px; }
  .auth-form input { 
    width: 100%; 
    padding: 16px; 
    margin-bottom: 12px; 
    border: 2px solid var(--border); 
    border-radius: 12px; 
    font-family: 'Courier New', Courier, monospace; 
    font-size: 24px; 
    text-align: center; 
    letter-spacing: 8px;
    font-weight: 700;
    transition: var(--transition); 
  }
  .auth-form input:focus { outline:none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(0, 102, 204, 0.1); }
  .auth-btn { width: 100%; background: var(--primary); color: var(--white); border: none; padding: 16px; border-radius: 12px; font-weight: 700; font-size: 16px; cursor: pointer; transition: var(--transition); margin-top: 10px; box-shadow: 0 4px 12px rgba(0, 102, 204, 0.2); }
  .auth-btn:hover { background:#0056b3; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0, 102, 204, 0.3); }
  .resend-container { margin-top: 25px; padding-top: 20px; border-top: 1px solid var(--border); text-align: center; }
  .secondary-btn { background: transparent; color: var(--primary); border: none; padding: 8px 16px; font-weight: 700; font-size: 14px; cursor: pointer; transition: var(--transition); }
  .secondary-btn:hover { color: #0056b3; text-decoration: underline; }
  .secondary-btn:disabled { color: var(--gray); cursor: not-allowed; text-decoration: none; }
  .hint { font-size: 13px; color: var(--gray); margin-top: 15px; }
  .timer-box { display: inline-block; background: #f0f4f8; padding: 4px 10px; border-radius: 6px; font-family: monospace; font-weight: 700; color: var(--primary); }
</style>

<div class="auth-container">
  <div class="auth-card">
    <div style="text-align: center; margin-bottom: 20px;">
        <i class="fas fa-envelope-open-text" style="font-size: 48px; color: var(--primary);"></i>
    </div>
    <h2>Verify Email</h2>
    <p class="auth-subtitle">
      Enter the 6-digit code sent to<br><strong>{{ email }}</strong>
    </p>

    <form method="POST" class="auth-form" id="otp-form">
      {% csrf_token %}
      <input
        type="text"
        name="otp"
        inputmode="numeric"
        autocomplete="one-time-code"
        placeholder="000000"
        maxlength="6"
        pattern="\d{6}"
        required
        autofocus
      >
      <button type="submit" class="auth-btn">Verify Account</button>
    </form>

    <div class="resend-container">
        <p class="hint">Didn't receive the code?</p>
        <form method="POST" action="{% url 'resend_email_otp' %}" id="resend-form">
          {% csrf_token %}
          <button type="submit" class="secondary-btn" id="resend-btn">Resend OTP</button>
        </form>
        <div class="hint" id="timer-text">
          Expires in <span class="timer-box" id="timer">{{ ttl_seconds }}</span>s
        </div>
    </div>
  </div>
</div>

<script>
    // Simple countdown timer
    let timeLeft = {{ ttl_seconds }};
    const timerDisplay = document.getElementById('timer');
    const resendBtn = document.getElementById('resend-btn');
    
    const countdown = setInterval(() => {
        if (timeLeft <= 0) {
            clearInterval(countdown);
            timerDisplay.parentElement.innerHTML = "Code expired. Please resend.";
        } else {
            timeLeft--;
            timerDisplay.textContent = timeLeft;
        }
    }, 1000);

    // Disable resend button for a bit to prevent spam (handled by backend too)
    let resendCooldown = 60;
    resendBtn.disabled = true;
    resendBtn.textContent = `Resend OTP (${resendCooldown}s)`;
    
    const cooldownTimer = setInterval(() => {
        if (resendCooldown <= 0) {
            clearInterval(cooldownTimer);
            resendBtn.disabled = false;
            resendBtn.textContent = "Resend OTP";
        } else {
            resendCooldown--;
            resendBtn.textContent = `Resend OTP (${resendCooldown}s)`;
        }
    }, 1000);
</script>
{% endblock %}
