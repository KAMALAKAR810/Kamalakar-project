{% extends "base.html" %}
{% load static %}

{% block content %}
<style>
  .auth-container { display:flex; justify-content:center; align-items:center; min-height: calc(100vh - 250px); padding: 20px; }
  .auth-card { background: var(--white); padding: 40px; border-radius: 16px; width: 100%; max-width: 450px; box-shadow: var(--shadow); border: 1px solid var(--border); }
  .auth-card h2 { font-size: 24px; font-weight: 800; text-align: center; margin-bottom: 8px; color: var(--dark); }
  .auth-subtitle { text-align:center; font-size: 14px; color: var(--gray); margin-bottom: 24px; }
  .auth-form input { width: 100%; padding: 14px 16px; margin-bottom: 12px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 14px; transition: var(--transition); }
  .auth-form input:focus { outline:none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1); }
  .auth-btn { width: 100%; background: var(--primary); color: var(--white); border: none; padding: 14px; border-radius: 8px; font-weight: 700; font-size: 15px; cursor: pointer; transition: var(--transition); margin-top: 6px; }
  .auth-btn:hover { background:#0056b3; transform: translateY(-1px); }
  .secondary-btn { width: 100%; background: transparent; color: var(--primary); border: 1px solid var(--border); padding: 12px; border-radius: 8px; font-weight: 700; font-size: 14px; cursor: pointer; transition: var(--transition); margin-top: 10px; }
  .secondary-btn:hover { border-color: var(--primary); background: rgba(0, 102, 204, 0.06); }
  .hint { font-size: 12px; color: var(--gray); margin-top: 10px; text-align: center; }
</style>

<div class="auth-container">
  <div class="auth-card">
    <h2>Verify your email</h2>
    <p class="auth-subtitle">
      We sent a 6-digit OTP to <strong>{{ email }}</strong>.
    </p>

    <form method="POST" class="auth-form">
      {% csrf_token %}
      <input
        type="text"
        name="otp"
        inputmode="numeric"
        autocomplete="one-time-code"
        placeholder="Enter 6-digit OTP"
        maxlength="6"
        required
      >
      <button type="submit" class="auth-btn">Verify OTP</button>
    </form>

    <form method="POST" action="{% url 'resend_email_otp' %}">
      {% csrf_token %}
      <button type="submit" class="secondary-btn">Resend OTP</button>
    </form>

    <div class="hint">
      OTP expires in {{ ttl_seconds }} seconds.
    </div>
  </div>
</div>
{% endblock %}
