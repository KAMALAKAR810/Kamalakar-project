{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="auth-container">
  <div class="otp-card">
    <div style="text-align: center; margin-bottom: 20px;">
        <i class="fas fa-envelope-open-text" style="font-size: 48px; color: var(--primary);"></i>
    </div>
    <h2>Verify Email</h2>
    <p class="auth-subtitle">
      Enter the 6-digit code sent to<br><strong>{{ email }}</strong>
    </p>

    <form method="POST" class="auth-form" id="otp-form">
      {% csrf_token %}
      <input
        type="text"
        name="otp"
        class="otp-input"
        inputmode="numeric"
        autocomplete="one-time-code"
        placeholder="000000"
        maxlength="6"
        pattern="\d{6}"
        required
        autofocus
      >
      <button type="submit" class="otp-btn">Verify Account</button>
    </form>

    <div class="resend-container">
        <p class="hint">Didn't receive the code?</p>
        <form method="POST" action="{% url 'resend_email_otp' %}" id="resend-form">
          {% csrf_token %}
          <button type="submit" class="secondary-btn" id="resend-btn">Resend OTP</button>
        </form>
        <div class="hint" id="timer-text">
          Expires in <span class="timer-box" id="timer">{{ ttl_seconds }}</span>s
        </div>
    </div>
  </div>
</div>

<script>
    // Simple countdown timer
    let timeLeft = {{ ttl_seconds }};
    const timerDisplay = document.getElementById('timer');
    const resendBtn = document.getElementById('resend-btn');
    
    const countdown = setInterval(() => {
        if (timeLeft <= 0) {
            clearInterval(countdown);
            timerDisplay.parentElement.innerHTML = "Code expired. Please resend.";
        } else {
            timeLeft--;
            timerDisplay.textContent = timeLeft;
        }
    }, 1000);

    // Disable resend button for a bit to prevent spam (handled by backend too)
    let resendCooldown = 60;
    resendBtn.disabled = true;
    resendBtn.textContent = `Resend OTP (${resendCooldown}s)`;
    
    const cooldownTimer = setInterval(() => {
        if (resendCooldown <= 0) {
            clearInterval(cooldownTimer);
            resendBtn.disabled = false;
            resendBtn.textContent = "Resend OTP";
        } else {
            resendCooldown--;
            resendBtn.textContent = `Resend OTP (${resendCooldown}s)`;
        }
    }, 1000);
</script>
{% endblock %}
