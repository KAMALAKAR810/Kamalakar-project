{% extends "admin_base.html" %}
{% block content %}
<div class="auth-card" style="max-width: 450px; margin: 50px auto; padding: 40px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center;">
    <div style="margin-bottom: 30px;">
        <i class="fas fa-user-shield" style="font-size: 64px; color: var(--primary);"></i>
        <h1 style="margin-top: 20px; font-weight: 800; color: var(--dark);">Admin 2FA</h1>
        <p style="color: var(--gray);">Please complete the second factor authentication to access the admin area.</p>
    </div>

    <!-- Tabs for different auth methods -->
    <div style="display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap;">
        <button onclick="switchTab('pin')" id="btn-pin" class="btn-tab active" style="padding: 10px 20px; border-radius: 50px; border: 1px solid var(--primary); background: var(--primary); color: white; cursor: pointer; font-weight: 700;">PIN</button>
        <button onclick="switchTab('security_question')" id="btn-question" class="btn-tab" style="padding: 10px 20px; border-radius: 50px; border: 1px solid var(--border); background: white; color: var(--gray); cursor: pointer; font-weight: 700;">Question</button>
    </div>

    <!-- PIN Form -->
    <form id="form-pin" method="POST" style="display: block;">
        {% csrf_token %}
        <input type="hidden" name="auth_type" value="pin">
        <div class="form-group" style="margin-bottom: 25px;">
            <label style="display: block; text-align: left; font-weight: 600; margin-bottom: 8px;">Enter 6-Digit PIN</label>
            <input type="password" name="pin" maxlength="6" pattern="\d{6}" required placeholder="••••••" style="width: 100%; padding: 15px; border-radius: 8px; border: 1px solid var(--border); font-size: 24px; text-align: center; letter-spacing: 10px;">
        </div>
        <button type="submit" class="btn-gold" style="width: 100%; padding: 15px; border-radius: 8px; font-weight: 800;">VERIFY PIN</button>
    </form>

    <!-- Security Question Form -->
    <form id="form-security_question" method="POST" style="display: none;">
        {% csrf_token %}
        <input type="hidden" name="auth_type" value="security_question">
        <div class="form-group" style="margin-bottom: 25px; text-align: left;">
            <label style="display: block; font-weight: 600; margin-bottom: 8px;">Security Question:</label>
            <p style="padding: 15px; background: #f8f9fa; border-radius: 8px; border-left: 4px solid var(--primary); font-weight: 700;">{{ profile.admin_security_question }}</p>
            <label style="display: block; font-weight: 600; margin: 15px 0 8px;">Your Answer: <span style="font-weight: 400; font-size: 11px; color: var(--danger);">(Case Sensitive)</span></label>
            <input type="text" name="answer" required placeholder="Enter answer..." style="width: 100%; padding: 15px; border-radius: 8px; border: 1px solid var(--border);">
        </div>
        <button type="submit" class="btn-gold" style="width: 100%; padding: 15px; border-radius: 8px; font-weight: 800;">VERIFY ANSWER</button>
    </form>

    <div style="margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px;">
        <a href="{% url 'logout' %}" style="color: var(--danger); text-decoration: none; font-weight: 600; font-size: 14px;">
            <i class="fas fa-sign-out-alt"></i> Cancel and Logout
        </a>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
    function switchTab(tab) {
        // Hide all forms
        const pinForm = document.getElementById('form-pin');
        const questionForm = document.getElementById('form-security_question');
        
        if (pinForm) pinForm.style.display = 'none';
        if (questionForm) questionForm.style.display = 'none';
        
        // Remove active class from buttons
        document.querySelectorAll('.btn-tab').forEach(btn => {
            btn.style.background = 'white';
            btn.style.color = 'var(--gray)';
            btn.style.borderColor = 'var(--border)';
        });

        // Show selected form
        const targetForm = document.getElementById('form-' + tab);
        if (targetForm) targetForm.style.display = 'block';
        
        // Add active style to button
        const btnId = tab === 'security_question' ? 'btn-question' : 'btn-pin';
        const activeBtn = document.getElementById(btnId);
        if (activeBtn) {
            activeBtn.style.background = 'var(--primary)';
            activeBtn.style.color = 'white';
            activeBtn.style.borderColor = 'var(--primary)';
        }
    }
</script>
{% endblock %}
