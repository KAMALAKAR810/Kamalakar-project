<head>
    
</head>
{% extends "admin_base.html" %}

{% block content %}


<div class="admin-2fa-shell">
    <div class="admin-2fa-icon">
        <i class="fas fa-user-shield"></i>
    </div>
    <h1 class="admin-2fa-title">Admin 2FA</h1>
    <p class="admin-2fa-subtitle">Please complete the second factor authentication to access the admin area.</p>

    <div class="admin-2fa-tabs">
        <button onclick="switchTab('pin')" id="btn-pin" class="btn-tab active" type="button">PIN</button>
        <button onclick="switchTab('security_question')" id="btn-question" class="btn-tab" type="button">Question</button>
    </div>

    <form id="form-pin" method="POST" class="admin-2fa-form">
        {% csrf_token %}
        <input type="hidden" name="auth_type" value="pin">
        <div>
            <label class="admin-2fa-label" for="pin-input">Enter 6-Digit PIN</label>
            <input
                id="pin-input"
                class="admin-2fa-input"
                type="password"
                name="pin"
                maxlength="6"
                pattern="\d{6}"
                required
                placeholder="******"
                inputmode="numeric"
            >
        </div>
        <button type="submit" class="btn-gold">Verify PIN</button>
    </form>

    <form id="form-security_question" method="POST" class="admin-2fa-form">
        {% csrf_token %}
        <input type="hidden" name="auth_type" value="security_question">
        <div>
            <label class="admin-2fa-label">Security Question</label>
            <div class="admin-2fa-question">{{ profile.admin_security_question }}</div>
        </div>
        <div>
            <label class="admin-2fa-label" for="answer-input">Your Answer <span>(Case Sensitive)</span></label>
            <input id="answer-input" class="admin-2fa-answer" type="text" name="answer" required placeholder="Enter answer">
        </div>
        <button type="submit" class="btn-gold">Verify Answer</button>
    </form>

    <div class="admin-2fa-actions">
        <a href="{% url 'logout' %}" class="admin-2fa-cancel">
            <i class="fas fa-right-from-bracket"></i> Cancel and Logout
        </a>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function switchTab(tab) {
        const pinForm = document.getElementById('form-pin');
        const questionForm = document.getElementById('form-security_question');

        if (pinForm) pinForm.style.display = 'none';
        if (questionForm) questionForm.style.display = 'none';

        document.querySelectorAll('.btn-tab').forEach((btn) => {
            btn.classList.remove('active');
        });

        const targetForm = document.getElementById('form-' + tab);
        if (targetForm) {
            targetForm.style.display = 'grid';
        }

        const activeBtn = document.getElementById(tab === 'security_question' ? 'btn-question' : 'btn-pin');
        if (activeBtn) {
            activeBtn.classList.add('active');
        }
    }
</script>
{% endblock %}
