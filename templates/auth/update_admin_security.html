{% extends "admin_base.html" %}
{% block content %}
<div class="page-shell">
    <h1 class="page-title"><i class="fas fa-shield-alt"></i> Admin Security Settings</h1>
    
    <div class="data-panel" style="max-width: 700px; margin: 0 auto;">
        <p style="margin-bottom: 30px; color: var(--gray); font-size: 14px;">Manage your administrative access security. These settings control your PIN and security questions for the admin panel.</p>
        
        <form method="POST">
            {% csrf_token %}
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px;">
                <div class="form-group">
                    <label>ADMIN PIN (6 DIGITS)</label>
                    <input type="password" name="admin_pin" maxlength="6" pattern="\d{6}" value="{{ profile.admin_pin }}" required class="bet-input" placeholder="••••••">
                    <small style="color: #888; font-size: 11px;">Required for 2FA verification.</small>
                </div>

                <div class="form-group">
                    <label>SECURITY QUESTION</label>
                    <input type="text" name="admin_security_question" value="{{ profile.admin_security_question }}" required class="bet-input" placeholder="e.g. My childhood pet">
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 30px;">
                <label>SECURITY ANSWER</label>
                <input type="text" name="admin_security_answer" value="{{ profile.admin_security_answer }}" required class="bet-input" placeholder="Enter answer">
                <small style="color: #666; font-size: 11px;">Answers are case-sensitive.</small>
            </div>

            <div style="display: flex; gap: 15px; border-top: 1px solid #eee; padding-top: 25px;">
                <button type="submit" class="btn-gold" style="flex: 1;">SAVE ALL SETTINGS</button>
                <a href="{% url 'admin_summary' %}" class="btn-gold" style="background: #f8f9fa; color: #666; border: 1px solid #ddd;">CANCEL</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
