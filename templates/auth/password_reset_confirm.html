{% extends "base.html" %}
{% block content %}
<section class="auth-shell">
    <div class="auth-card">
        <div class="auth-card-inner">
            <div class="auth-eyebrow"><i class="fas fa-shield-halved"></i> Set New Password</div>
            <div class="auth-header">
                <h2>Create a new password</h2>
                <p class="auth-subtitle">Use a strong password you don't use elsewhere.</p>
            </div>

            {% if validlink %}
                <form method="post" class="auth-form">
                    {% csrf_token %}
                    <div class="field">
                        <label for="id_new_password1">New password</label>
                        <input class="control" type="password" name="new_password1" id="id_new_password1" required autocomplete="new-password">
                    </div>
                    <div class="field">
                        <label for="id_new_password2">Confirm new password</label>
                        <input class="control" type="password" name="new_password2" id="id_new_password2" required autocomplete="new-password">
                    </div>
                    <button type="submit" class="auth-btn">Update Password</button>
                </form>
            {% else %}
                <div class="card" style="padding:1rem;">
                    <p class="text-muted">This reset link is invalid or has expired.</p>
                    <a href="{% url 'password_reset' %}" class="btn btn-primary w-100">Request a new link</a>
                </div>
            {% endif %}
        </div>
    </div>
</section>
{% endblock %}
