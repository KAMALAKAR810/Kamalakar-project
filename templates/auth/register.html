{% extends "base.html" %}
{% load static %}

{% block extra_head %}
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-card">
        <div class="auth-card-inner">
            <div class="auth-eyebrow">
                <i class="fas fa-user-plus"></i>
                Sign Up
            </div>
            <div class="auth-header">
                <h2>Create your account</h2>
                <p class="auth-subtitle">Enter your details to register.</p>
            </div>

            <form method="post" enctype="multipart/form-data" class="auth-form" id="register-form">
                {% csrf_token %}

                <input type="text" name="website" class="honeypot" tabindex="-1" autocomplete="off">

                <div class="form-grid">
                    <div class="field">
                        <label for="reg-name">Full name</label>
                        <input class="control" type="text" name="name" id="reg-name" placeholder="Enter full name" value="{{ name|default:'' }}" required autocomplete="name">
                    </div>

                    <div class="field">
                        <label for="reg-username">Username</label>
                        <input class="control" type="text" name="username" id="reg-username" placeholder="Choose a username" value="{{ username|default:'' }}" required autocomplete="username">
                    </div>

                    <div class="field">
                        <label for="reg-email">Email</label>
                        <input class="control" type="email" name="email" id="reg-email" placeholder="you@example.com" value="{{ email|default:'' }}" required autocomplete="email">
                    </div>

                    <div class="field">
                        <label for="reg-mobile">Mobile number</label>
                        <input class="control" type="tel" name="mobile" id="reg-mobile" placeholder="10-digit mobile number" value="{{ mobile|default:'' }}" required autocomplete="tel">
                    </div>

                    <div class="field">
                        <label for="reg-password">Password</label>
                        <div class="password-wrapper">
                            <input class="control" type="password" name="password" id="reg-password" placeholder="Create a password" required autocomplete="new-password">
                            <i class="fas fa-eye toggle-password" id="togglePassword" role="button" tabindex="0" aria-label="Show password"></i>
                        </div>
                    </div>

                    <div class="field">
                        <label for="reg-password-confirm">Confirm password</label>
                        <div class="password-wrapper">
                            <input class="control" type="password" name="password2" id="reg-password-confirm" placeholder="Re-enter password" required autocomplete="new-password">
                            <i class="fas fa-eye toggle-password" id="togglePasswordConfirm" role="button" tabindex="0" aria-label="Show confirm password"></i>
                        </div>
                    </div>

                    <div class="field span-2">
                        <label for="reg-profile-pic">Profile picture</label>
                        <input class="control file-control" type="file" name="profile_pic" id="reg-profile-pic" accept="image/*">
                    </div>
                </div>

                <div class="recaptcha-wrap">
                    <div class="g-recaptcha" data-sitekey="{{ recaptcha_site_key }}"></div>
                </div>

                <div class="check-row">
                    <input type="checkbox" id="terms_agree" name="terms_agree" required>
                    <label for="terms_agree">
                        I agree to the Terms and Conditions.
                    </label>
                </div>

                <button type="submit" class="auth-btn">Create Account</button>
            </form>
        </div>

        <div class="auth-footer">
            Already have an account? <a href="{% url 'login' %}">Sign in</a>
            <span>&middot;</span>
            <a href="{% url 'landing' %}">Home</a>
        </div>
    </div>
</section>

<script>
    function bindToggle(triggerId, inputId) {
        const trigger = document.getElementById(triggerId);
        const input = document.getElementById(inputId);
        if (!trigger || !input) {
            return;
        }

        const toggle = function () {
            const nextType = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', nextType);
            this.classList.toggle('fa-eye-slash');
        };

        trigger.addEventListener('click', toggle);
        trigger.addEventListener('keydown', function (event) {
            if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault();
                toggle.call(this);
            }
        });
    }

    bindToggle('togglePassword', 'reg-password');
    bindToggle('togglePasswordConfirm', 'reg-password-confirm');
</script>
{% endblock %}
