{% extends "base.html" %}
{% block content %}
<div class="page-shell" style="text-align: center; padding: 100px 20px;">
    <div style="font-size: 80px; color: var(--danger); margin-bottom: 20px;">
        <i class="fas fa-exclamation-triangle"></i>
    </div>
    <h1 style="font-size: 32px; font-weight: 800; color: var(--dark); margin-bottom: 15px;">Page Under Development</h1>
    <p style="font-size: 18px; color: var(--gray); max-width: 600px; margin: 0 auto 40px;">
        We're working hard to bring you this feature. Please check back later or contact support if you have any questions.
    </p>
    <a href="{% url 'index' %}" class="btn-gold" style="padding: 15px 40px; text-decoration: none;">
        <i class="fas fa-home"></i> Back to Home
    </a>
</div>
{% endblock %}
