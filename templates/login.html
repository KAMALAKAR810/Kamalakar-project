{% extends "base.html" %}
{% load static %}

{% block content %}
<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 250px);
        padding: 20px;
    }

    .auth-card {
        background: var(--white);
        padding: 40px;
        border-radius: 16px;
        width: 100%;
        max-width: 400px;
        box-shadow: var(--shadow);
        border: 1px solid var(--border);
    }

    .auth-card h2 {
        font-size: 24px;
        font-weight: 800;
        text-align: center;
        margin-bottom: 30px;
        color: var(--dark);
    }

    .auth-form input {
        width: 100%;
        padding: 14px 16px;
        margin-bottom: 15px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-family: inherit;
        font-size: 14px;
        transition: var(--transition);
    }

    .auth-form input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
    }

    .auth-btn {
        width: 100%;
        background: var(--primary);
        color: var(--white);
        border: none;
        padding: 14px;
        border-radius: 8px;
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
        transition: var(--transition);
        margin-top: 10px;
    }

    .auth-btn:hover {
        background: #0056b3;
        transform: translateY(-1px);
    }

    .auth-footer {
        text-align: center;
        margin-top: 25px;
        font-size: 14px;
        color: var(--gray);
    }

    .auth-footer a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
    }
</style>

<div class="auth-container">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        
        <form method="POST" class="auth-form" id="login-form">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="auth-btn">Sign In</button>
        </form>
        
        <div class="auth-footer">
            Don't have an account? <a href="{% url 'register' %}">Create one now</a>
        </div>
    </div>
</div>

<script>
    // Handle AJAX login if needed, or just standard form
    const loginForm = document.getElementById('login-form');
    loginForm.addEventListener('submit', async (e) => {
        // If the view still expects JSON, we handle it here. 
        // But the current view handles both. Standard submit is fine.
    });
</script>
{% endblock %}
