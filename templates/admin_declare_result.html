{% extends "base.html" %}
{% block content %}
<div class="page-shell">
    <h2 class="page-title">Declare Result</h2>
    <p class="page-sub">Enter results to calculate winners</p>

    <div class="data-panel" style="max-width: 600px; margin: 0 auto;">
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Select Market</label>
                <select name="market_id" required style="width: 100%;">
                    <option value="">-- Choose Market --</option>
                    {% for m in markets %}
                        <option value="{{ m.id }}">{{ m.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
                <div class="form-group">
                    <label>Open Result (Patti-Single, e.g. 123-6)</label>
                    <input type="text" name="open_result" placeholder="123-6" style="width: 100%;">
                    <p style="font-size: 11px; color: var(--gray); margin-top: 4px;">Leave blank if not declaring Open result yet.</p>
                </div>
                <div class="form-group">
                    <label>Close Result (Single-Patti, e.g. 7-601)</label>
                    <input type="text" name="close_result" placeholder="7-601" style="width: 100%;">
                    <p style="font-size: 11px; color: var(--gray); margin-top: 4px;">Leave blank if not declaring Close result yet.</p>
                </div>
            </div>

            <button type="submit" class="gold-btn" style="width: 100%; margin-top: 30px;">DECLARE RESULT & CREDIT WINNERS</button>
        </form>
    </div>
</div>
{% endblock %}
