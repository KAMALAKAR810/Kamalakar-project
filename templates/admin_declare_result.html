{% extends "base.html" %}
{% block content %}
<div class="page-shell">
    <h2 class="page-title">Declare Result</h2>
    <p class="page-sub">Enter results to calculate winners</p>

    <div class="data-panel" style="max-width: 600px; margin: 0 auto;">
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Select Market</label>
                <select name="market_id" required style="width: 100%;">
                    <option value="">-- Choose Market --</option>
                    {% for m in markets %}
                        <option value="{{ m.id }}">{{ m.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
                <div class="form-group">
                    <label>Open Patti (e.g. 123)</label>
                    <input type="text" name="open_patti" maxlength="3" pattern="\d{3}" placeholder="123" required style="width: 100%;">
                </div>
                <div class="form-group">
                    <label>Open Single (0-9)</label>
                    <input type="text" name="open_single" maxlength="1" pattern="\d{1}" placeholder="6" required style="width: 100%;">
                </div>
                <div class="form-group">
                    <label>Close Single (0-9)</label>
                    <input type="text" name="close_single" maxlength="1" pattern="\d{1}" placeholder="7" required style="width: 100%;">
                </div>
                <div class="form-group">
                    <label>Close Patti (e.g. 601)</label>
                    <input type="text" name="close_patti" maxlength="3" pattern="\d{3}" placeholder="601" required style="width: 100%;">
                </div>
            </div>

            <button type="submit" class="gold-btn" style="width: 100%; margin-top: 30px;">DECLARE RESULT & CREDIT WINNERS</button>
        </form>
    </div>
</div>
{% endblock %}
