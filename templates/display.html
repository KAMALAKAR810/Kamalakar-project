{% for matka in matka_numbers %}
<div class="col-lg-4 col-md-4 col-sm-6 col-xs-12">
    <div class="single-result">
        <h2>
            <span class="left-time">{{ matka.m_time_1 }}</span>
            {{ matka.m_name }}
            <span class="right-time">{{ matka.m_time_2 }}</span>
        </h2>
        <ul>
            <li><p>{{ matka.m_number_1 }}</p></li>
            <li><p class="bold-sec">{{ matka.m_number_2 }}{{ matka.m_number_3 }}</p></li>
            <li><p>{{ matka.m_number_4 }}</p></li>
        </ul>
    </div>
</div>
{% endfor %}
