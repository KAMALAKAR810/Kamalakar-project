<head>
    <link rel="stylesheet" href="/static/style.css">
</head>
{% extends "base.html" %}
{% load static %}

{% block extra_head %}
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
{% endblock %}

{% block content %}


<section class="entry-shell">
    <div class="entry-card">
        <img class="entry-logo" src="{% static 'logo.jpeg' %}" alt="Change Life With Numbers">

        <form method="post" class="entry-form" id="landing-gate-form">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">
            <div class="recaptcha-wrap">
                <div
                    class="g-recaptcha"
                    data-sitekey="{{ recaptcha_site_key }}"
                    data-callback="submitLandingGate"
                ></div>
            </div>
        </form>
    </div>
</section>

<script>
    function submitLandingGate() {
        const form = document.getElementById('landing-gate-form');
        if (!form || form.classList.contains('is-submitting')) {
            return;
        }

        form.classList.add('is-submitting');
        window.setTimeout(function () {
            form.submit();
        }, 120);
    }
</script>
{% endblock %}
