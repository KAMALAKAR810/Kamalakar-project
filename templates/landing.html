{% extends "base.html" %}
{% load static %}

{% block extra_head %}
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
{% endblock %}

{% block content %}
<section class="verify-shell">
    <div class="verify-card">
        <img class="verify-logo" src="{% static 'logo.jpeg' %}" alt="Change Life With Numbers">
        <div class="verify-title">Verification</div>
        <div class="verify-subtitle">Please verify to enter the website.</div>

        <form method="post" class="verify-form" id="landing-gate-form">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">
            <div class="recaptcha-wrap">
                <div
                    class="g-recaptcha"
                    data-sitekey="{{ recaptcha_site_key }}"
                    data-callback="submitLandingGate"
                ></div>
            </div>
        </form>
    </div>
</section>

<script>
    function submitLandingGate() {
        const form = document.getElementById('landing-gate-form');
        if (!form || form.classList.contains('is-submitting')) {
            return;
        }

        form.classList.add('is-submitting');
        window.setTimeout(function () {
            form.submit();
        }, 120);
    }
</script>
{% endblock %}
