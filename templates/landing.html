{% extends "base.html" %}
{% load static %}

{% block content %}
<section class="verify-shell">
    <div class="verify-card">
        <img class="verify-logo" src="{% static 'logo.jpeg' %}" alt="Change Life With Numbers">
        <div class="verify-title">Verification</div>
        <div class="verify-subtitle">Please verify to enter the website.</div>

        <form method="post" class="verify-form" id="human-verify-form">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">
            <input type="hidden" name="human_verified" id="human_verified" value="0">

            <label class="verify-check">
                <input type="checkbox" id="human-check">
                <span class="verify-box"><i class="fas fa-check"></i></span>
                <span class="verify-label">I am not a robber</span>
            </label>

            <button type="submit" class="btn btn-primary w-100" id="verify-btn" disabled>
                Continue
            </button>
        </form>
    </div>
</section>

<script>
    (function () {
        const check = document.getElementById('human-check');
        const hidden = document.getElementById('human_verified');
        const btn = document.getElementById('verify-btn');
        if (!check || !hidden || !btn) return;

        function sync() {
            const ok = !!check.checked;
            hidden.value = ok ? '1' : '0';
            btn.disabled = !ok;
        }

        check.addEventListener('change', sync);
        sync();
    })();
</script>
{% endblock %}
