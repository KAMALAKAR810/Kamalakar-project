{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="flex items-center justify-center min-h-screen bg-gray-100 p-4">
    <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-md w-full text-center border-2 border-primary">
        <div class="mb-6">
            <img src="{% static 'logo.jpeg' %}" alt="Logo" class="w-24 h-24 mx-auto rounded-full shadow-lg border-4 border-gold mb-4">
            <h1 class="text-3xl font-extrabold text-dark-900 mb-2">Welcome to MATKA</h1>
            <p class="text-gray-600">Enter the site to start playing.</p>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <button type="submit" class="w-full bg-primary hover:bg-primary-dark text-white font-bold py-3 px-6 rounded-xl transition-all transform hover:scale-105 shadow-lg flex items-center justify-center gap-2">
                <i class="fas fa-door-open"></i>
                Enter Site
            </button>
        </form>
    </div>
</div>

<style>
    .bg-primary { background-color: #d4af37; } /* Gold color */
    .hover-bg-primary-dark:hover { background-color: #b8960c; }
    .border-gold { border-color: #d4af37; }
</style>
{% endblock %}
