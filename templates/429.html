<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Too Many Requests</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            width: min(92%, 520px);
            background: #ffffff;
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
        }
        h1 {
            margin: 0 0 12px 0;
            font-size: 24px;
        }
        p {
            margin: 0 0 16px 0;
            line-height: 1.6;
            color: #444;
        }
        a {
            display: inline-block;
            margin-top: 6px;
            text-decoration: none;
            color: #fff;
            background: #2563eb;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 600;
        }
        a:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Too many requests</h1>
        <p>Your recent actions were rate-limited for security reasons. Please wait a minute and try again.</p>
        <a href="/">Go to Home</a>
    </div>
</body>
</html>
